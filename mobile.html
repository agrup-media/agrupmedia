<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>AgRup Media | Mobile Ansicht</title>
  <link rel="icon" type="image/png" href="./assets/favicon.png?v=1">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png?v=1">
  <style>
    :root {
      --gold: #c89542;
      --gold2: #f2c879;
      --white: #ffffff;
      --line: rgba(255, 255, 255, .12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(200, 149, 66, .18), transparent 34%),
        #050505;
      color: var(--white);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .mobile-preview {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .preview-shell {
      width: min(430px, 100%);
      display: grid;
      gap: 14px;
    }

    .preview-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 4px;
      color: rgba(255, 255, 255, .72);
      font-size: 12px;
      font-weight: 850;
    }

    .preview-brand {
      color: var(--gold2);
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: 11px;
      font-weight: 950;
    }

    .preview-size {
      color: rgba(255, 255, 255, .52);
    }

    .phone-frame {
      position: relative;
      width: 390px;
      max-width: 100%;
      height: min(844px, calc(100dvh - 88px));
      min-height: 620px;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid rgba(242, 200, 121, .34);
      border-radius: 34px;
      background: #000;
      box-shadow:
        0 28px 80px rgba(0, 0, 0, .58),
        0 0 38px rgba(200, 149, 66, .14);
    }

    .phone-frame::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      z-index: 2;
      width: 96px;
      height: 22px;
      border-radius: 999px;
      background: #050505;
      transform: translateX(-50%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .08);
      pointer-events: none;
    }

    .mobile-site {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: #000;
    }

    @media (max-width: 700px) {
      html,
      body {
        background: #000;
      }

      .mobile-preview {
        display: block;
        padding: 0;
      }

      .preview-shell {
        width: 100%;
        min-height: 100dvh;
      }

      .preview-topbar {
        display: none;
      }

      .phone-frame {
        width: 100vw;
        max-width: none;
        height: 100dvh;
        min-height: 100dvh;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .phone-frame::before {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="mobile-preview" aria-label="Mobile Ansicht von AgRup Media">
    <div class="preview-shell">
      <div class="preview-topbar" aria-hidden="true">
        <span class="preview-brand">AgRup Media</span>
        <span class="preview-size">Mobile Ansicht 390 × 844</span>
      </div>
      <div class="phone-frame">
        <iframe class="mobile-site" src="./projekte/index.html" title="AgRup Media Projektseite in mobiler Ansicht"></iframe>
      </div>
    </div>
  </main>
</body>
</html>
